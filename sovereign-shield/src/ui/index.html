<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sovereign Shield</title>
    <style>body{font-family:Arial,Helvetica,sans-serif;margin:20px} button{margin:6px}</style>
  </head>
  <body>
    <h1>Sovereign Shield (Electron)</h1>
    <nav style="margin-bottom:12px">
      <button id="nav-home">Home</button>
      <button id="nav-policy">Policy</button>
      <button id="nav-logs">Logs</button>
    </nav>
    <div>
      <button id="btn-start-bg">Start Background Service</button>
      <button id="btn-stop-bg">Stop Background Service</button>
      <button id="btn-enable-autostart">Enable Auto-start</button>
      <button id="btn-disable-autostart">Disable Auto-start</button>
    </div>
    <div id="content">
      <pre id="status">Initializing...</pre>
    </div>
    <script>
      // CA prompt UI
      async function checkAndRenderCA() {
        try {
          const ca = await window.sovereignAPI.checkCA('data/proxy-ca/ca.cert.pem');
          const container = document.createElement('div');
          container.style.padding = '10px';
          container.style.border = '1px solid #ddd';
          container.style.marginTop = '12px';

          if (!ca.exists) {
            container.innerHTML = `<strong>Developer HTTPS interception not installed</strong><div>To inspect HTTPS traffic locally you can install a developer CA (safe for local dev only).</div>`;
            const btn = document.createElement('button');
            btn.textContent = 'Install Dev CA';
            btn.onclick = async () => {
              btn.disabled = true;
              const res = await window.sovereignAPI.installCA('data/proxy-ca/ca.cert.pem');
              alert(JSON.stringify(res));
              btn.disabled = false;
            };
            container.appendChild(btn);
          } else {
            container.innerHTML = `<strong>Developer CA installed</strong><div>Path: ${ca.path}</div>`;
            const btn = document.createElement('button');
            btn.textContent = 'Uninstall Dev CA';
            btn.onclick = async () => {
              btn.disabled = true;
              const res = await window.sovereignAPI.uninstallCA(ca.path || 'Sovereign Shield Dev CA');
              alert(JSON.stringify(res));
              btn.disabled = false;
            };
            container.appendChild(btn);
          }

          document.body.insertBefore(container, document.getElementById('content'));
        } catch (e) {
          console.warn('CA prompt unavailable:', e.message || e);
        }
      }
      async function refreshStatus() {
        const statusEl = document.getElementById('status');
        try {
          const st = await window.sovereignAPI.getSystemStatus();
          statusEl.innerText = JSON.stringify(st, null, 2);
        } catch (err) {
          statusEl.innerText = 'Error fetching system status: ' + err.message;
        }
      }

      window.addEventListener('DOMContentLoaded', async () => {
        document.getElementById('btn-start-bg').addEventListener('click', async () => {
          const res = await window.sovereignAPI.startBackgroundService();
          alert(JSON.stringify(res));
          await refreshStatus();
        });

        document.getElementById('btn-stop-bg').addEventListener('click', async () => {
          const res = await window.sovereignAPI.stopBackgroundService();
          alert(JSON.stringify(res));
          await refreshStatus();
        });

        document.getElementById('btn-enable-autostart').addEventListener('click', async () => {
          const res = await window.sovereignAPI.enableAutostart();
          alert(JSON.stringify(res));
        });

        document.getElementById('btn-disable-autostart').addEventListener('click', async () => {
          const res = await window.sovereignAPI.disableAutostart();
          alert(JSON.stringify(res));
        });

        document.getElementById('nav-policy').addEventListener('click', () => {
          fetch('policy.html').then(r => r.text()).then(html => { document.getElementById('content').innerHTML = html; });
        });

        document.getElementById('nav-logs').addEventListener('click', async () => {
          document.getElementById('content').innerHTML = '<h3>Logs</h3><pre id="logs">Loading...</pre>';
          try {
            const st = await window.sovereignAPI.getSystemStatus();
            document.getElementById('logs').innerText = JSON.stringify(st, null, 2);
          } catch (e) {
            document.getElementById('logs').innerText = 'Error: ' + e.message;
          }
        });

        document.getElementById('nav-home').addEventListener('click', () => { refreshStatus(); document.getElementById('content').innerHTML = document.getElementById('status').outerHTML; });

        await refreshStatus();
        // Show CA install prompt for developer flow
        checkAndRenderCA();
      });
    </script>
  </body>
</html>
