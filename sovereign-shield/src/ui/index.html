<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sovereign Shield</title>
    <style>body{font-family:Arial,Helvetica,sans-serif;margin:20px}</style>
  </head>
  <body>
    <h1>Sovereign Shield (Electron)</h1>
    <div id="status">Initializing...</div>
    <script>
      window.addEventListener('DOMContentLoaded', async () => {
        const statusEl = document.getElementById('status');
        try {
          const st = await window.sovereignAPI.getSystemStatus();
          statusEl.innerText = JSON.stringify(st, null, 2);
        } catch (err) {
          statusEl.innerText = 'Error fetching system status: ' + err.message;
        }
      });
    </script>
  </body>
</html>
