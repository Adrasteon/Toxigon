name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Test (matrix: PROXY_MITM)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [24.x]
        proxy: [false, true]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm ci --prefix sovereign-shield

      - name: Install optional dependencies (when proxy enabled)
        if: matrix.proxy == 'true'
        run: npm install --prefix sovereign-shield --no-audit --no-fund

      - name: Run tests
        run: npm test --prefix sovereign-shield --silent
        env:
          PROXY_MITM: ${{ matrix.proxy && '1' || '' }}
name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Use Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint || true
      - name: Run tests
        run: npm test --silent
      - name: Build Docker image
        run: |
          docker build -t sovereign-shield:ci sovereign-shield

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push Docker image to GHCR
        run: |
          IMAGE=ghcr.io/${{ github.repository_owner }}/sovereign-shield:${{ github.sha }}
          docker tag sovereign-shield:ci $IMAGE
          docker push $IMAGE
